# cargo-deny policy.
#
# md4, des, and md-5 are broken-by-design primitives that MSCHAPv2 and RADIUS
# mandate (CLAUDE.md rule 9; IMPLEMENTATION_SPEC.md section 2). They are NOT
# banned here on purpose. If an informational RUSTSEC advisory appears for
# them, record the specific ID under [advisories].ignore with a comment
# pointing at CLAUDE.md and keep the crates.

[advisories]
ignore = []

[bans]
multiple-versions = "warn"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
